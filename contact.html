<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us - MultiQR Generator</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background: linear-gradient(145deg, #10182f 0%, #1e2a47 100%); padding: 1.5rem; min-height: 100vh; }
        .container { max-width: 1000px; margin: 0 auto; background: rgba(255,255,255,0.1); backdrop-filter: blur(2px); border-radius: 2rem; padding: 2rem; }
        .nav-menu { background: rgba(0,0,0,0.4); padding: 12px 20px; border-radius: 50px; margin-bottom: 30px; text-align: center; }
        .nav-menu a { color: #FFD966; text-decoration: none; margin: 0 15px; font-weight: bold; }
        h1 { color: #FFB347; margin-bottom: 20px; text-align: center; }
        .form-container { background: rgba(0,0,0,0.3); border-radius: 1.5rem; padding: 1.5rem; margin: 20px 0; }
        label { color: #FFE3A4; display: block; margin-bottom: 8px; font-weight: bold; }
        input, textarea { width: 100%; padding: 12px; background: #0a0f1fcc; border: 1.5px solid #ffc978; border-radius: 28px; color: white; font-size: 1rem; margin-bottom: 20px; outline: none; }
        input:focus, textarea:focus { border-color: #ffa01e; box-shadow: 0 0 0 3px rgba(255,170,50,0.4); }
        button { background: linear-gradient(98deg, #F9A826, #F57C00); border: none; padding: 12px 30px; border-radius: 60px; font-weight: bold; font-size: 1rem; color: #1e2a2f; cursor: pointer; width: 100%; }
        button:hover { transform: translateY(-3px); box-shadow: 0 10px 20px rgba(0,0,0,0.3); }
        .note { color: #bbd1ff; font-size: 0.8rem; text-align: center; margin-top: 15px; }
        .success { color: #aaffaa; text-align: center; margin-top: 15px; padding: 10px; border-radius: 28px; background: rgba(0,0,0,0.3); }
        .error { color: #ff9999; text-align: center; margin-top: 15px; padding: 10px; border-radius: 28px; background: rgba(0,0,0,0.3); }
        footer { text-align: center; margin-top: 40px; color: #888; }
    </style>
</head>
<body>
<div class="container">
    <div class="nav-menu">
        <a href="index.html">🏠 Home</a>
        <a href="about.html">ℹ️ About</a>
        <a href="privacy-policy.html">🔒 Privacy Policy</a>
        <a href="contact.html">📞 Contact</a>
    </div>
    <h1><i class="fas fa-headset"></i> Contact Us</h1>
    
    <div class="form-container">
        <form id="contactForm">
            <label><i class="fas fa-user"></i> Your Name *</label>
            <input type="text" id="userName" placeholder="Enter your full name" required>
            
            <label><i class="fas fa-map-marker-alt"></i> Your Address *</label>
            <textarea id="userAddress" rows="3" placeholder="Enter your complete address" required></textarea>
            
            <button type="submit" id="submitBtn"><i class="fas fa-paper-plane"></i> Send Message</button>
        </form>
        <div id="formMessage" class="note">
            <i class="fas fa-info-circle"></i> Your information will be sent securely
        </div>
    </div>
    <footer>© 2026 MultiQR Forge | Free QR Code Generator</footer>
</div>

<script>
    // ⚠️ IMPORTANT: आपको यहाँ अपनी Google Form URL डालनी है ⚠️
    // Step 1: Google Form बनाएं (forms.google.com)
    // Step 2: Form में Name और Address के Questions बनाएं
    // Step 3: Send → Embed HTML → action="..." वाली URL Copy करें
    // Step 4: नीचे YOUR_GOOGLE_FORM_URL की जगह Paste करें
    
    var GOOGLE_FORM_URL = "YOUR_GOOGLE_FORM_URL_HERE";
    
    // अगर आपके पास Google Form URL नहीं है, तो यह Demo Mode में काम करेगा
    var DEMO_MODE = true;  // जब URL डाल दें तो false कर दें
    
    document.getElementById('contactForm').addEventListener('submit', function(e) {
        e.preventDefault();
        
        var name = document.getElementById('userName').value.trim();
        var address = document.getElementById('userAddress').value.trim();
        var messageDiv = document.getElementById('formMessage');
        
        if(name === "" || address === "") {
            messageDiv.innerHTML = '<i class="fas fa-exclamation-triangle"></i> Please fill both fields!';
            messageDiv.className = "error";
            return;
        }
        
        // Demo Mode - जब तक आप URL नहीं डालते
        if(DEMO_MODE || GOOGLE_FORM_URL === "YOUR_GOOGLE_FORM_URL_HERE") {
            messageDiv.innerHTML = '<i class="fas fa-check-circle"></i> Thank you ' + name + '! Your response has been recorded. (Demo Mode)';
            messageDiv.className = "success";
            document.getElementById('contactForm').reset();
            return;
        }
        
        // Real Google Form Submit
        var formData = new FormData();
        formData.append("entry.XXXXX", name);  // यहाँ अपने Field IDs डालें
        formData.append("entry.XXXXX", address);
        
        fetch(GOOGLE_FORM_URL, {
            method: "POST",
            body: formData,
            mode: "no-cors"
        }).then(function() {
            messageDiv.innerHTML = '<i class="fas fa-check-circle"></i> Thank you ' + name + '! Your response has been submitted.';
            messageDiv.className = "success";
            document.getElementById('contactForm').reset();
        }).catch(function() {
            messageDiv.innerHTML = '<i class="fas fa-exclamation-triangle"></i> Error! Please try again.';
            messageDiv.className = "error";
        });
    });
</script>
</body>
</html>
